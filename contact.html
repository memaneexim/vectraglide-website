<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Vectraglide</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0b0b0f] text-white font-sans antialiased">

    <nav class="sticky top-0 w-full glass-nav border-b border-white/10 z-50 px-6 md:px-12 py-5 flex justify-between items-center">
        <div class="font-black text-xl tracking-wider text-white">
            <a href="index.html">VECTRAGLIDE<span class="text-orange-500">.</span></a>
        </div>
        <div class="hidden md:flex space-x-10 text-sm font-medium text-gray-400">
            <a href="index.html" class="hover:text-white transition-colors">Home</a>
            <a href="about.html" class="hover:text-white transition-colors">About</a>
            <a href="services.html" class="hover:text-white transition-colors">Services</a>
            <a href="contact.html" class="text-white border-b border-orange-500 pb-1">Contact</a>
        </div>
        <div>
            <a href="contact.html" class="bg-white text-black px-5 py-2 rounded-full text-xs font-bold tracking-wide hover:bg-orange-500 hover:text-white transition-all duration-300">Get Started</a>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-24">
        <span class="text-orange-500 text-xs font-bold uppercase tracking-widest">Connect</span>
        <h1 class="text-5xl font-black tracking-tight mt-2 mb-4">Let's Build.</h1>
        <p class="text-gray-400 mb-12">Reach out to connect on premium logistics planning or performance systems.</p>

        <form class="space-y-6">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Name</label>
                <input type="text" class="w-full bg-[#0e0e12] border border-white/10 focus:border-orange-500 rounded-xl px-4 py-3 text-white outline-none transition-colors">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Email Address</label>
                <input type="email" class="w-full bg-[#0e0e12] border border-white/10 focus:border-orange-500 rounded-xl px-4 py-3 text-white outline-none transition-colors">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Message</label>
                <textarea rows="5" class="w-full bg-[#0e0e12] border border-white/10 focus:border-orange-500 rounded-xl px-4 py-3 text-white outline-none transition-colors"></textarea>
            </div>
            <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-4 rounded-xl transition-colors tracking-wide text-sm uppercase">Submit Inquiry</button>
        </form>
    </main>

</body>
</html>
